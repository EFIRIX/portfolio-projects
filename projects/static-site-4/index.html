<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЕГЭ · Ударения — тренажёр</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="light">

<div class="app">
  <div class="top-bar">
    <button id="themeToggle">🌙 / ☀️</button>
    <button id="errorsMode" class="hidden">Тренажёр ошибок</button>
  </div>

  <div id="card" class="card">
    <div class="question">Кликни по букве с ударением</div>
    <div id="word" class="word"></div>
    <div id="result" class="result"></div>
  </div>

  <div class="controls">
    <span id="progress"></span>
  </div>

  <div id="summary" class="summary hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
