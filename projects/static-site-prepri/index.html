<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЕГЭ · ПРЕ / ПРИ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="light">

<div class="app">
  <div class="top-bar">
    <button id="themeToggle">🌙 / ☀️</button>
    <button id="errorsMode" class="hidden">Тренажёр ошибок</button>
  </div>

  <div id="card" class="card">
    <div class="question">Впиши букву: <b>Е</b> или <b>И</b></div>
    <div id="word" class="word"></div>

    <input
      id="input"
      class="input"
      maxlength="1"
      autocomplete="off"
      placeholder="?"
    >

    <div id="typedHint" class="typed-hint">Вы ввели: —</div>

    <div id="result" class="result"></div>
  </div>

  <div class="controls">
    <span id="progress"></span>
  </div>

  <div id="summary" class="summary hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
