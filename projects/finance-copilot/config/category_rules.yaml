# Правила категоризации по ключевым словам.
#
# Как это работает:
#   - Для каждой транзакции берётся описание (merchant / назначение платежа),
#     приводится к нижнему регистру, и проверяется вхождение подстрок ниже.
#   - Первая категория, у которой сработало ключевое слово, выигрывает
#     (категории проверяются в порядке их следования в этом файле).
#   - Всё, что не совпало ни с одним правилом, уходит в LLM-fallback,
#     а если LLM отключён/недоступен — в категорию "прочее".
#
# Ключевые слова матчатся как подстроки, регистр игнорируется.
# Добавляйте сюда мерчантов из своих выписок — это дешевле и точнее, чем LLM.

