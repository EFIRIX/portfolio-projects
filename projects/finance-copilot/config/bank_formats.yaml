# Конфигурируемый маппинг колонок CSV разных банков.
#
# Названия колонок в выписках банков различаются, поэтому мы НЕ хардкодим их
# в парсере. Вместо этого каждый формат описывает, какая колонка исходного
# файла соответствует какому логическому полю.
#
# Логические поля:
#   date        — дата операции (обязательно)
#   amount      — сумма операции (обязательно)
#   description — назначение платежа / мерчант (обязательно)
#   currency    — валюта (опционально)
#
# Парсер (csv_parser.py) определяет формат автоматически: берёт первый формат,
# все обязательные колонки которого присутствуют в заголовке файла.
# Порядок в этом файле = приоритет автоопределения.

форматы:
  tinkoff:
    описание: "Тинькофф — экспорт операций"
    delimiter: ";"
    encoding: "utf-8"
    decimal: ","          # 1 234,56 -> знак дробной части
    thousands: " "        # разделитель тысяч (неразрывный/обычный пробел)
    date_format: "%d.%m.%Y %H:%M:%S"
    columns:
      date: "Дата операции"
      amount: "Сумма операции"
      description: "Описание"
      currency: "Валюта операции"

  sber:
    описание: "Сбербанк — экспорт в CSV"
    delimiter: ","
    encoding: "utf-8"
    decimal: "."
    thousands: ""
    date_format: "%Y-%m-%d"
    columns:
      date: "Дата"
      amount: "Сумма"
      description: "Назначение платежа"
      currency: "Валюта"

  # Пример добавления нового банка: скопируйте блок, поменяйте columns
  # под заголовки конкретной выписки. Код менять не нужно.
  generic_en:
    описание: "Обобщённый англоязычный формат"
    delimiter: ","
    encoding: "utf-8"
    decimal: "."
    thousands: ""
    date_format: "%Y-%m-%d"
    columns:
      date: "Date"
      amount: "Amount"
      description: "Description"
      currency: "Currency"
