services:
  postgres:
    image: postgres:16-alpine
    container_name: history_mvp_postgres
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: history_mvp_backend
    restart: unless-stopped
    init: true
    depends_on:
      minio:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV}
      APP_NAME: ${APP_NAME}
      API_V1_PREFIX: ${API_V1_PREFIX}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      RESET_TOKEN_EXPIRE_MINUTES: ${RESET_TOKEN_EXPIRE_MINUTES}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
      CSRF_ENABLED: ${CSRF_ENABLED:-true}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
      FIRST_CURATOR_EMAIL: ${FIRST_CURATOR_EMAIL:-}
      FIRST_CURATOR_PASSWORD: ${FIRST_CURATOR_PASSWORD:-}
      FIRST_METHODIST_EMAIL: ${FIRST_METHODIST_EMAIL:-}
      FIRST_METHODIST_PASSWORD: ${FIRST_METHODIST_PASSWORD:-}
      FIRST_MODERATOR_EMAIL: ${FIRST_MODERATOR_EMAIL:-}
      FIRST_MODERATOR_PASSWORD: ${FIRST_MODERATOR_PASSWORD:-}
      AUTH_MAX_FAILED_LOGINS: ${AUTH_MAX_FAILED_LOGINS}
      AUTH_LOCK_MINUTES: ${AUTH_LOCK_MINUTES}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_LOGIN_ATTEMPTS: ${RATE_LIMIT_LOGIN_ATTEMPTS:-5}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES:-1}
      PD_CONSENT_REQUIRED: ${PD_CONSENT_REQUIRED:-true}
      PD_CONSENT_VERSION: ${PD_CONSENT_VERSION:-v1.0}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION}
      S3_BUCKET: uploads
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: strongpassword123
      S3_USE_SSL: "false"
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB}
      UPLOAD_ALLOWED_MIME: ${UPLOAD_ALLOWED_MIME}
      LEARNING_RESPONSE_AUDIO_MAX_MB: ${LEARNING_RESPONSE_AUDIO_MAX_MB:-25}
      LEARNING_RESPONSE_VIDEO_MAX_MB: ${LEARNING_RESPONSE_VIDEO_MAX_MB:-100}
      LEARNING_RESPONSE_TEXT_MAX_CHARS: ${LEARNING_RESPONSE_TEXT_MAX_CHARS:-4000}
      LEARNING_RESPONSE_ALLOWED_AUDIO_MIME: ${LEARNING_RESPONSE_ALLOWED_AUDIO_MIME:-audio/webm,audio/mpeg,audio/mp4,audio/wav,audio/ogg}
      LEARNING_RESPONSE_ALLOWED_VIDEO_MIME: ${LEARNING_RESPONSE_ALLOWED_VIDEO_MIME:-video/mp4,video/webm,video/quicktime}
      ORAL_EXAM_SIM_LIMIT: ${ORAL_EXAM_SIM_LIMIT:-12}
      ORAL_EXAM_SIM_DURATION_MINUTES: ${ORAL_EXAM_SIM_DURATION_MINUTES:-15}
      ORAL_TEXT_PASS_THRESHOLD: ${ORAL_TEXT_PASS_THRESHOLD:-2}
      ORAL_TICKET_PASS_THRESHOLD: ${ORAL_TICKET_PASS_THRESHOLD:-5}
      DEFAULT_THEME: ${DEFAULT_THEME}
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_DEFAULT_THEME: ${NEXT_PUBLIC_DEFAULT_THEME}
    container_name: history_mvp_frontend
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      NEXT_PUBLIC_DEFAULT_THEME: ${NEXT_PUBLIC_DEFAULT_THEME}
      API_SERVER_URL: ${API_SERVER_URL}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000 > /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: history_mvp_minio
    restart: unless-stopped
    init: true
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: strongpassword123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  minio_data:
